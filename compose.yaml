services:
  postgres:
    image: postgis/postgis:17-3.4-alpine
    container_name: finance_dashboard_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=finance
    ports:
      - "5433:5432"
    volumes:
      - finance_dashboard_postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  finance_dashboard_postgres_data:
